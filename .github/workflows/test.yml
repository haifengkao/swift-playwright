name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, namespace-profile-mac]

    steps:
      - uses: actions/checkout@v4

      - name: Install Swift (Linux)
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Cache Swift Build Artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-build-${{ hashFiles('Package.swift', 'Package.resolved', 'src/**/*.swift', 'tests/**/*.swift', 'cli/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-build-${{ hashFiles('Package.swift', 'Package.resolved') }}
            ${{ runner.os }}-swift-build-

      - name: Install Playwright Driver
        run: swift package --allow-writing-to-package-directory --allow-network-connections all:443 install-playwright

      - name: Install Browsers
        run: |
          DRIVER_DIR=$(ls -1d src/drivers/playwright-*/ | head -1)
          "$DRIVER_DIR/node" "$DRIVER_DIR/package/cli.js" install --with-deps

      - name: Build (including tests)
        run: swift build

      - name: Run tests
        timeout-minutes: 10
        run: swift test -v -Xswiftc -DCI
